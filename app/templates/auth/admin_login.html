{% extends "base.html" %}

{% block title %}Admin Login - AgriConnect{% endblock %}

{% block content %}
<div class="min-h-screen py-12">
    <div class="container mx-auto px-4 max-w-md">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="bg-gradient-to-r from-red-600 to-red-500 p-6 text-center">
                <i class="fas fa-user-shield text-5xl text-white"></i>
                <h2 class="text-2xl font-bold text-white mt-2">Admin Login</h2>
                <p class="text-red-100">Platform administration</p>
            </div>
            
            <form method="POST" class="p-6 space-y-4">
                <div>
                    <label class="block text-gray-700 mb-2">Admin Email</label>
                    <input type="email" name="email" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
                </div>
                
                <div>
                    <label class="block text-gray-700 mb-2">Password</label>
                    <input type="password" name="password" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
                </div>
                
                <button type="submit" class="w-full bg-red-600 text-white py-3 rounded-lg hover:bg-red-700 transition font-semibold">
                    Admin Login
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
