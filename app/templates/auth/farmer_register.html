{% extends "base.html" %}

{% block title %}Register as Farmer - AgriConnect{% endblock %}

{% block content %}
<div class="min-h-screen py-12">
    <div class="container mx-auto px-4 max-w-2xl">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="bg-gradient-to-r from-green-600 to-green-500 p-6 text-center">
                <i class="fas fa-tractor text-5xl text-white"></i>
                <h2 class="text-2xl font-bold text-white mt-2">Farmer Registration</h2>
                <p class="text-green-100">Join the digital farming revolution</p>
            </div>
            
            <form method="POST" class="p-6 space-y-4">
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 mb-2">Username *</label>
                        <input type="text" name="username" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2">Email *</label>
                        <input type="email" name="email" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2">Password *</label>
                        <input type="password" name="password" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2">Confirm Password *</label>
                        <input type="password" name="confirm_password" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2">Phone Number *</label>
                        <input type="tel" name="phone" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2">Farm Name *</label>
                        <input type="text" name="farm_name" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2">Farm Size (acres) *</label>
                        <input type="number" step="0.1" name="farm_size" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                    </div>
                </div>
                
                <div>
                    <label class="block text-gray-700 mb-2">Address *</label>
                    <textarea name="address" rows="3" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"></textarea>
                </div>
                
                <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition font-semibold">
                    Register as Farmer
                </button>
                
                <p class="text-center text-gray-600">
                    Already have an account? <a href="{{ url_for('auth.farmer_login') }}" class="text-green-600 hover:underline">Login here</a>
                </p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
