{% extends "base.html" %}

{% block title %}Supplier Login - AgriConnect{% endblock %}

{% block content %}
<div class="min-h-screen py-12">
    <div class="container mx-auto px-4 max-w-md">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="bg-gradient-to-r from-purple-600 to-purple-500 p-6 text-center">
                <i class="fas fa-truck text-5xl text-white"></i>
                <h2 class="text-2xl font-bold text-white mt-2">Supplier Login</h2>
                <p class="text-purple-100">Manage your fertilizer business</p>
            </div>
            
            <form method="POST" class="p-6 space-y-4">
                <div>
                    <label class="block text-gray-700 mb-2">Email Address</label>
                    <input type="email" name="email" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                </div>
                
                <div>
                    <label class="block text-gray-700 mb-2">Password</label>
                    <input type="password" name="password" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                </div>
                
                <button type="submit" class="w-full bg-purple-600 text-white py-3 rounded-lg hover:bg-purple-700 transition font-semibold">
                    Login as Supplier
                </button>
                
                <p class="text-center text-gray-600">
                    New supplier? <a href="{{ url_for('auth.register_supplier') }}" class="text-purple-600 hover:underline">Register here</a>
                </p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
