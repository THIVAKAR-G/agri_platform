{% extends "base.html" %}

{% block title %}Register as Consumer - AgriConnect{% endblock %}

{% block content %}
<div class="min-h-screen py-12">
    <div class="container mx-auto px-4 max-w-2xl">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="bg-gradient-to-r from-blue-600 to-blue-500 p-6 text-center">
                <i class="fas fa-shopping-basket text-5xl text-white"></i>
                <h2 class="text-2xl font-bold text-white mt-2">Consumer Registration</h2>
                <p class="text-blue-100">Buy fresh produce directly from farmers</p>
            </div>
            
            <form method="POST" class="p-6 space-y-4">
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 mb-2">Username *</label>
                        <input type="text" name="username" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2">Email *</label>
                        <input type="email" name="email" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2">Password *</label>
                        <input type="password" name="password" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2">Confirm Password *</label>
                        <input type="password" name="confirm_password" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2">Phone Number *</label>
                        <input type="tel" name="phone" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2">Preferred Categories</label>
                        <input type="text" name="preferred_categories" placeholder="e.g., vegetables, fruits, grains" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                
                <div>
                    <label class="block text-gray-700 mb-2">Delivery Address *</label>
                    <textarea name="address" rows="3" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
                
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition font-semibold">
                    Register as Consumer
                </button>
                
                <p class="text-center text-gray-600">
                    Already have an account? <a href="{{ url_for('auth.consumer_login') }}" class="text-blue-600 hover:underline">Login here</a>
                </p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
